<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540">
  <rect width="960" height="540" fill="#0b1020"/>
  <text x="48" y="58" fill="#f8fbff" font-size="30" font-family="Arial, sans-serif" font-weight="700">Manim：像 3Blue1Brown 一样讲清抽象结构</text>
  <text x="48" y="92" fill="#aab6d3" font-size="17" font-family="Arial, sans-serif">适合做：层级、箭头、公式感推演、成本曲线，不适合做真实 App UI</text>

  <line x1="120" y1="156" x2="840" y2="156" stroke="#28324f" stroke-width="2"/>
  <line x1="120" y1="286" x2="840" y2="286" stroke="#28324f" stroke-width="2"/>
  <line x1="120" y1="416" x2="840" y2="416" stroke="#28324f" stroke-width="2"/>
  <text x="60" y="162" fill="#d4dcff" font-size="18" font-family="Arial, sans-serif">产品层</text>
  <text x="60" y="292" fill="#d4dcff" font-size="18" font-family="Arial, sans-serif">路由层</text>
  <text x="60" y="422" fill="#d4dcff" font-size="18" font-family="Arial, sans-serif">模型层</text>

  <circle cx="270" cy="156" r="44" fill="#1b2a4a" stroke="#79d7ff" stroke-width="3"/>
  <text x="246" y="164" fill="#ffffff" font-size="20" font-family="Arial, sans-serif" font-weight="700">豆包</text>
  <circle cx="480" cy="286" r="38" fill="#37234e" stroke="#ff78c4" stroke-width="3"/>
  <text x="454" y="294" fill="#ffffff" font-size="18" font-family="Arial, sans-serif" font-weight="700">Route</text>

  <circle cx="270" cy="416" r="42" fill="#153a3e" stroke="#5eead4" stroke-width="3"/>
  <text x="241" y="424" fill="#ffffff" font-size="18" font-family="Arial, sans-serif">Flash</text>
  <circle cx="480" cy="416" r="42" fill="#493516" stroke="#facc15" stroke-width="3"/>
  <text x="454" y="424" fill="#ffffff" font-size="18" font-family="Arial, sans-serif">Lite</text>
  <circle cx="690" cy="416" r="42" fill="#40202a" stroke="#fb7185" stroke-width="3"/>
  <text x="670" y="424" fill="#ffffff" font-size="18" font-family="Arial, sans-serif">Pro</text>

  <path d="M304 184 C365 226 414 250 448 269" stroke="#79d7ff" stroke-width="4" fill="none" marker-end="url(#arrow1)"/>
  <path d="M454 318 C410 356 340 386 306 402" stroke="#5eead4" stroke-width="4" fill="none" marker-end="url(#arrow2)"/>
  <path d="M480 326 L480 368" stroke="#facc15" stroke-width="4" fill="none" marker-end="url(#arrow3)"/>
  <path d="M506 318 C552 356 626 386 656 402" stroke="#fb7185" stroke-width="4" fill="none" marker-end="url(#arrow4)"/>

  <text x="610" y="172" fill="#dbeafe" font-size="24" font-family="Georgia, serif">f(question, mode) = model</text>
  <text x="610" y="210" fill="#8ea3cc" font-size="17" font-family="Arial, sans-serif">逐步写出关系，比一张复杂 PPT 更容易懂。</text>

  <defs>
    <marker id="arrow1" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#79d7ff"/></marker>
