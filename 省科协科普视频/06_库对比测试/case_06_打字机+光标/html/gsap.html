<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: rgb(30,32,35); overflow: hidden; }
  .canvas {
    width: 1280px; height: 720px; position: relative; margin: 0 auto;
    background: rgb(30,32,35);
  }
  .input-wrap {
    position: absolute; left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    width: 600px; height: 48px;
  }
  .input-box {
    width: 100%; height: 100%;
    background: rgb(240,242,245); border-radius: 8px;
    display: flex; align-items: center; padding: 0 16px;
    font-family: system-ui, sans-serif; font-size: 18px;
    color: rgb(40,42,45); position: relative;
    border: 2px solid transparent;
  }
  .cursor {
    display: inline-block; width: 2px; height: 22px;
    background: rgb(40,42,45); margin-left: 2px;
  }
  .mouse {
    position: absolute; right: -60px; top: 50%;
    transform: translateY(-50%);
    width: 20px; height: 28px;
  }
</style>
</head>
<body>
<div class="canvas">
  <div class="input-wrap">
    <div class="input-box" id="inputBox">
      <span id="typedText"></span><span class="cursor" id="cursor"></span>
    </div>
    <svg class="mouse" viewBox="0 0 20 28">
      <path d="M10 0 L3 10 L7 10 L7 22 L13 22 L13 10 L17 10 Z" fill="rgb(0,200,80)"/>
    </svg>
  </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script>
  const text = "帮我看看这份保险条款有哪些坑";
  const obj = { typed: 0 };
  gsap.to(obj, { typed: text.length, duration: 1.3, ease: "none", onUpdate() {
    document.getElementById("typedText").textContent = text.slice(0, Math.floor(obj.typed));
  }});
  gsap.to("#cursor", { opacity: 0, duration: 0.3, repeat: -1, yoyo: true, ease: "steps(1)" });
  gsap.to("#inputBox", { borderColor: "rgb(0,200,80)", duration: 0.3, repeat: -1, yoyo: true, ease: "steps(1)" });
  gsap.to(".mouse", { y: -8, duration: 1, repeat: -1, yoyo: true, ease: "sine.inOut" });
</script>
</body>
</html>
