<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: rgb(30,32,35); overflow: hidden; }
  .canvas {
    width: 1280px; height: 720px; position: relative; margin: 0 auto;
    background: rgb(30,32,35);
  }
  .input-wrap {
    position: absolute; left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    width: 600px; height: 48px;
  }
  .input-box {
    width: 100%; height: 100%;
    background: rgb(240,242,245); border-radius: 8px;
    display: flex; align-items: center; padding: 0 16px;
    font-family: system-ui, sans-serif; font-size: 18px;
    color: rgb(40,42,45); position: relative;
    border: 2px solid transparent;
    animation: borderBlink 0.6s step-end infinite;
  }
  @keyframes borderBlink {
    0%, 100% { border-color: transparent; }
    50% { border-color: rgb(0,200,80); }
  }
  .cursor {
    display: inline-block; width: 2px; height: 22px;
    background: rgb(40,42,45);
    animation: cursorBlink 0.6s step-end infinite;
    margin-left: 2px;
  }
  @keyframes cursorBlink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }
  .mouse {
    position: absolute; right: -60px; top: 50%;
    transform: translateY(-50%);
    width: 20px; height: 28px;
    animation: mouseHover 2s ease-in-out infinite;
  }
  @keyframes mouseHover {
    0%, 100% { transform: translateY(-50%) translate(0, 0); }
    50% { transform: translateY(-50%) translate(0, -8px); }
  }
</style>
</head>
<body>
<div class="canvas">
  <div class="input-wrap">
    <div class="input-box" id="inputBox">
      <span id="typedText"></span><span class="cursor"></span>
    </div>
    <svg class="mouse" viewBox="0 0 20 28">
      <path d="M10 0 L3 10 L7 10 L7 22 L13 22 L13 10 L17 10 Z" fill="rgb(0,200,80)"/>
    </svg>
  </div>
</div>
<script>
  const text = "帮我看看这份保险条款有哪些坑";
  const totalTime = 1300;
  const startTime = performance.now();
  const el = document.getElementById("typedText");

  function typewriter() {
    const elapsed = performance.now() - startTime;
    const progress = Math.min(1, elapsed / totalTime);
    const charCount = Math.floor(progress * text.length);
    el.textContent = text.slice(0, charCount);
    if (progress < 1) requestAnimationFrame(typewriter);
  }
  requestAnimationFrame(typewriter);
</script>
</body>
</html>
