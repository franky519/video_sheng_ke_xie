<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: rgb(30,32,35); overflow: hidden; display: flex; align-items: center; justify-content: center; height: 100vh; }
  .canvas {
    width: 1280px; height: 720px; position: relative;
    background: rgb(30,32,35);
  }
  .phone {
    position: absolute; width: 280px; height: 500px;
    background: rgb(50,53,58); border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.4);
    padding: 24px 20px; display: flex; flex-direction: column; gap: 14px;
    transform-origin: center center;
  }
  .phone-left {
    left: 50%; top: 50%;
    margin-left: -410px; margin-top: -250px;
    transform: scale(0); animation: springPop 1s 0s forwards;
  }
  .phone-right {
    left: 50%; top: 50%;
    margin-left: 130px; margin-top: -250px;
    transform: scale(0); animation: springPop 1s 1s forwards;
  }
  @keyframes springPop {
    0%   { transform: scale(0); }
    50%  { transform: scale(1.06); }
    70%  { transform: scale(0.96); }
    85%  { transform: scale(1.015); }
    100% { transform: scale(1); }
  }
  .phone-title {
    font-family: system-ui, sans-serif;
    font-size: 20px; font-weight: 600; color: rgba(255,255,255,0.9);
    margin-bottom: 6px;
  }
  .phone-left .phone-title { color: rgba(120,180,255,0.9); }
  .phone-right .phone-title { color: rgba(100,220,150,0.9); }
  .text-line {
    height: 14px; border-radius: 3px;
    background: rgba(255,255,255,0.06);
  }
  .text-line:nth-child(2) { width: 92%; }
  .text-line:nth-child(3) { width: 85%; }
  .text-line:nth-child(4) { width: 78%; }
  .text-line:nth-child(5) { width: 88%; }
  .text-line:nth-child(6) { width: 70%; }
</style>
</head>
<body>
<div class="canvas">
  <div class="phone phone-left">
    <div class="phone-title">快速模式</div>
    <div class="text-line"></div><div class="text-line"></div>
    <div class="text-line"></div><div class="text-line"></div>
    <div class="text-line"></div>
  </div>
  <div class="phone phone-right">
    <div class="phone-title">专家模式</div>
    <div class="text-line"></div><div class="text-line"></div>
    <div class="text-line"></div><div class="text-line"></div>
    <div class="text-line"></div>
  </div>
</div>
</body>
</html>
