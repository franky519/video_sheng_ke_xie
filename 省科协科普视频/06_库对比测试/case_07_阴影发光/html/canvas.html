<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: rgb(30,32,35); overflow: hidden; margin: 0; }
  canvas { display: block; }
</style>
</head>
<body>
<canvas id="cvs"></canvas>
<script>
const cvs = document.getElementById("cvs");
const ctx = cvs.getContext("2d");
cvs.width = 1280; cvs.height = 720;

const startTime = performance.now();

function draw(t) {
  const elapsed = (t - startTime) / 1000;
  ctx.fillStyle = "rgb(30,32,35)";
  ctx.fillRect(0, 0, 1280, 720);

  const springP = Math.min(1, elapsed / 0.5);
  let scale = 0, glowAlpha = 0, glowRadius = 0;
  if (springP > 0) {
    const sp = Math.min(1, springP);
    // Simulate spring damping:10 mass:0.5
    const osc = Math.exp(-10 * sp) * Math.sin(sp * Math.PI * 5);
    scale = sp < 0.6 ? sp / 0.6 * 1.2 : 1.2 - 0.2 * ((sp - 0.6) / 0.4);
    if (elapsed > 0.5) {
      scale = 1 + Math.sin((elapsed - 0.5) * Math.PI * 2) * 0.015;
    }
    glowRadius = Math.min(30, elapsed / 0.5 * 30);
    glowAlpha = Math.min(0.7, elapsed / 0.5 * 0.7);
  }

  ctx.save();
  ctx.translate(640, 360);
  ctx.scale(scale, scale);

  for (let i = 5; i >= 0; i--) {
    const r = glowRadius * (1 + i * 0.5);
    const a = glowAlpha * (0.15 - i * 0.02);
    ctx.shadowColor = `rgba(255,60,60,${Math.max(0, a)})`;
    ctx.shadowBlur = r;
    ctx.fillStyle = "rgb(255,60,60)";
    ctx.font = "700 120px system-ui, sans-serif";
    ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.fillText("?", 0, 0);
  }
  ctx.restore();

  if (elapsed < 3.5) requestAnimationFrame(draw);
}
requestAnimationFrame(draw);
</script>
</body>
</html>
