<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: rgb(30,32,35); overflow: hidden; }
  .canvas {
    width: 1280px; height: 720px; position: relative; margin: 0 auto;
    background: rgb(30,32,35); display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 40px;
  }
  .number { font-family: monospace; font-size: 72px; color: white; font-weight: 700; }
  .bar-wrap { width: 80px; height: 200px; background: rgba(255,255,255,0.05); border-radius: 4px; overflow: hidden; }
  .bar { width: 100%; background: rgb(0,200,80); border-radius: 4px; height: 0; }
</style>
</head>
<body>
<div class="canvas">
  <div class="number" id="num">$0.0000</div>
  <div class="bar-wrap"><div class="bar" id="bar"></div></div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script>
  gsap.to({val: 0}, {
    val: 0.0035,
    duration: 0.5,
    ease: "power2.out",
    delay: 0.3,
    onUpdate() {
      document.getElementById("num").textContent = `$${this.targets()[0].val.toFixed(4)}`;
    }
  });
  gsap.to("#bar", { height: "100%", duration: 0.8, ease: "power2.out", delay: 0.3 });
</script>
</body>
</html>
