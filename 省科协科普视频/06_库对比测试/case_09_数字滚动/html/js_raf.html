<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: rgb(30,32,35); overflow: hidden; }
  .canvas {
    width: 1280px; height: 720px; position: relative; margin: 0 auto;
    background: rgb(30,32,35); display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 40px;
  }
  .number { font-family: monospace; font-size: 72px; color: white; font-weight: 700; }
  .bar-wrap { width: 80px; height: 200px; background: rgba(255,255,255,0.05); border-radius: 4px; overflow: hidden; }
  .bar { width: 100%; background: rgb(0,200,80); border-radius: 4px; height: 0; transition: height 0.8s ease-out; }
</style>
</head>
<body>
<div class="canvas">
  <div class="number" id="num">$0.0000</div>
  <div class="bar-wrap"><div class="bar" id="bar"></div></div>
</div>
<script>
const target = 0.0035;
const duration = 500;
const startTime = performance.now();
const el = document.getElementById("num");

function easeOut(t) { return 1 - Math.pow(1 - t, 3); }

function anim() {
  const elapsed = performance.now() - startTime;
  const p = Math.min(1, elapsed / duration);
  const val = easeOut(p) * target;
  el.textContent = `$${val.toFixed(4)}`;
  if (p < 1) requestAnimationFrame(anim);
}
setTimeout(() => {
  requestAnimationFrame(anim);
  document.getElementById("bar").style.height = "100%";
}, 300);
</script>
</body>
</html>
