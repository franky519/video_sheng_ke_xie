<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: rgb(30,32,35); overflow: hidden; margin: 0; }
  canvas { display: block; }
</style>
</head>
<body>
<canvas id="cvs"></canvas>
<script>
const cvs = document.getElementById("cvs");
const ctx = cvs.getContext("2d");
cvs.width = 1280;
cvs.height = 720;

const startTime = performance.now();

function easeOutQuad(t) { return 1 - (1 - t) * (1 - t); }

function draw(t) {
  const elapsed = (t - startTime) / 1000;

  ctx.fillStyle = "rgb(30,32,35)";
  ctx.fillRect(0, 0, 1280, 720);

  const cx = 240, cy = 180, cw = 800, ch = 360, r = 12;
  ctx.fillStyle = "rgb(50,53,58)";
  roundRect(ctx, cx, cy, cw, ch, r);
  ctx.fill();

  // text lines
  ctx.fillStyle = "rgba(255,255,255,0.07)";
  ctx.fillRect(cx + 50, cy + 42, 525, 16);
  ctx.fillRect(cx + 50, cy + 98, 616, 16);
  ctx.fillRect(cx + 50, cy + 154, 455, 16);

  // green highlight
  const greenW = 525;
  const greenP = Math.min(1, Math.max(0, elapsed / 1.0));
  const greenClip = easeOutQuad(greenP) * greenW;
  ctx.save();
  ctx.beginPath();
  ctx.rect(cx + 50, cy + 42, greenClip, 26);
  ctx.clip();
  ctx.fillStyle = "rgba(0,200,80,0.3)";
  roundRect(ctx, cx + 50, cy + 42, greenW, 26, 4);
  ctx.fill();
  ctx.restore();

  // orange highlight (delayed 1s)
  const orangeW = 616;
  const orangeP = Math.min(1, Math.max(0, (elapsed - 1) / 1.0));
  const orangeClip = easeOutQuad(orangeP) * orangeW;
  ctx.save();
  ctx.beginPath();
  ctx.rect(cx + 50, cy + 98, orangeClip, 26);
  ctx.clip();
  ctx.fillStyle = "rgba(255,160,20,0.3)";
  roundRect(ctx, cx + 50, cy + 98, orangeW, 26, 4);
  ctx.fill();
  ctx.restore();

  if (elapsed < 3.0) requestAnimationFrame(draw);
}

function roundRect(context, x, y, w, h, r) {
  context.beginPath();
  context.moveTo(x + r, y);
  context.lineTo(x + w - r, y);
  context.arcTo(x + w, y, x + w, y + r, r);
  context.lineTo(x + w, y + h - r);
  context.arcTo(x + w, y + h, x + w - r, y + h, r);
  context.lineTo(x + r, y + h);
  context.arcTo(x, y + h, x, y + h - r, r);
  context.lineTo(x, y + r);
  context.arcTo(x, y, x + r, y, r);
  context.closePath();
}

requestAnimationFrame(draw);
</script>
</body>
</html>
