<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: rgb(30,32,35); overflow: hidden; }
  .canvas {
    width: 1280px; height: 720px; position: relative; margin: 0 auto;
    background: rgb(30,32,35); display: flex; align-items: center; justify-content: center;
  }
  .question {
    font-family: system-ui, sans-serif; font-size: 120px;
    color: rgb(255,60,60); font-weight: 700;
    filter: drop-shadow(0 0 0px rgba(255,60,60,0));
    animation: glowPop 0.5s ease-out 0s forwards, breathe 2s ease-in-out 0.5s infinite;
  }
  @keyframes glowPop {
    0% { transform: scale(0); filter: drop-shadow(0 0 0px rgba(255,60,60,0)); }
    60% { transform: scale(1.2); filter: drop-shadow(0 0 8px rgba(255,60,60,0.5)); }
    100% { transform: scale(1); filter: drop-shadow(0 0 30px rgba(255,60,60,0.7)); }
  }
  @keyframes breathe {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.015); }
  }
</style>
</head>
<body>
<div class="canvas">
  <div class="question">?</div>
</div>
</body>
</html>
