<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: rgb(30,32,35); overflow: hidden; margin: 0; }
  canvas { display: block; }
</style>
</head>
<body>
<canvas id="cvs"></canvas>
<script>
const cvs = document.getElementById("cvs");
const ctx = cvs.getContext("2d");
cvs.width = 1280; cvs.height = 720;

const text = "帮我看看这份保险条款有哪些坑";
const startTime = performance.now();

function draw(t) {
  const elapsed = (t - startTime) / 1000;
  ctx.fillStyle = "rgb(30,32,35)";
  ctx.fillRect(0, 0, 1280, 720);

  const bx = 340, by = 336, bw = 600, bh = 48;
  ctx.fillStyle = "rgb(240,242,245)";
  ctx.beginPath();
  ctx.moveTo(bx + 8, by); ctx.lineTo(bx + bw - 8, by);
  ctx.arcTo(bx + bw, by, bx + bw, by + 8, 8);
  ctx.lineTo(bx + bw, by + bh - 8);
  ctx.arcTo(bx + bw, by + bh, bx + bw - 8, by + bh, 8);
  ctx.lineTo(bx + 8, by + bh);
  ctx.arcTo(bx, by + bh, bx, by + bh - 8, 8);
  ctx.lineTo(bx, by + 8);
  ctx.arcTo(bx, by, bx + 8, by, 8);
  ctx.closePath(); ctx.fill();

  if (Math.floor(elapsed / 0.3) % 2 === 0) {
    ctx.strokeStyle = "rgb(0,200,80)"; ctx.lineWidth = 2;
    ctx.stroke();
  }

  const charCount = Math.min(text.length, Math.floor(elapsed / 1.3 * text.length));
  ctx.fillStyle = "rgb(40,42,45)";
  ctx.font = "18px system-ui, sans-serif";
  ctx.fillText(text.slice(0, charCount), bx + 16, by + 30);

  if (Math.floor(elapsed * 10) % 6 < 3) {
    const cw = ctx.measureText(text.slice(0, charCount)).width;
    ctx.fillStyle = "rgb(40,42,45)";
    ctx.fillRect(bx + 16 + cw + 2, by + 12, 2, 22);
  }

  const mx = bx + bw + 40, my = by + 24 + Math.sin(elapsed * 3) * 4;
  ctx.fillStyle = "rgb(0,200,80)";
  ctx.beginPath();
  ctx.moveTo(mx, my - 14); ctx.lineTo(mx - 8, my - 4);
  ctx.lineTo(mx - 2, my - 2); ctx.lineTo(mx - 2, my + 14);
  ctx.lineTo(mx + 2, my + 14); ctx.lineTo(mx + 2, my - 2);
  ctx.lineTo(mx + 8, my - 4); ctx.closePath(); ctx.fill();

  if (elapsed < 4) requestAnimationFrame(draw);
}
requestAnimationFrame(draw);
</script>
</body>
</html>
