<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: rgb(30,32,35); overflow: hidden; }
  .canvas {
    width: 1280px; height: 720px; position: relative; margin: 0 auto;
    background: rgb(30,32,35);
  }
  svg { width: 100%; height: 100%; }
  .box {
    fill: rgba(60,65,70,0.8); stroke: rgba(255,255,255,0.6);
    stroke-width: 2; rx: 8;
  }
  .label {
    fill: rgba(255,255,255,0.8); font-family: system-ui, sans-serif;
    font-size: 22px; text-anchor: middle; dominant-baseline: middle;
  }
  .line {
    fill: none; stroke: rgb(0,200,80); stroke-width: 2;
  }
</style>
</head>
<body>
<div class="canvas">
  <svg viewBox="0 0 1280 720">
    <rect class="box" id="box1" x="80" y="160" width="320" height="100" opacity="0"/>
    <text class="label" id="label1" x="240" y="210" opacity="0">产品层</text>
    <line class="line" id="line1" x1="400" y1="210" x2="500" y2="210" stroke-dasharray="120" stroke-dashoffset="120"/>
    <polygon id="arr1" fill="rgb(0,200,80)" points="500,205 515,210 500,215" opacity="0"/>

    <rect class="box" id="box2" x="540" y="160" width="320" height="100" opacity="0"/>
    <text class="label" id="label2" x="700" y="210" opacity="0">路由层</text>
    <line class="line" id="line2" x1="860" y1="210" x2="960" y2="210" stroke-dasharray="120" stroke-dashoffset="120"/>
    <polygon id="arr2" fill="rgb(0,200,80)" points="960,205 975,210 960,215" opacity="0"/>

    <rect class="box" id="box3" x="1000" y="160" width="280" height="100" opacity="0"/>
    <text class="label" id="label3" x="1140" y="210" opacity="0">模型层</text>
  </svg>
</div>
<script src="https://cdn.jsdelivr.net/npm/animejs@3.2.2/lib/anime.min.js"></script>
<script>
  const layers = [
    { box: "#box1", label: "#label1", line: "#line1", arr: "#arr1" },
    { box: "#box2", label: "#label2", line: "#line2", arr: "#arr2" },
    { box: "#box3", label: "#label3", line: "#line3", arr: "#arr3" },
  ];
  layers.forEach((l, i) => {
    const d = i * 600;
    anime({ targets: l.box, opacity: [0, 1], duration: 300, delay: d, easing: "linear" });
    anime({ targets: l.label, opacity: [0, 1], duration: 300, delay: d, easing: "linear" });
    anime({ targets: l.line, strokeDashoffset: [120, 0], duration: 600, delay: d + 200, easing: "easeOutQuad" });
    anime({ targets: l.arr, opacity: [0, 1], duration: 200, delay: d + 600, easing: "linear" });
  });
</script>
</body>
</html>
