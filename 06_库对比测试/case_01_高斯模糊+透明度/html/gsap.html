<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: rgb(30,32,35); overflow: hidden; }
  .canvas {
    width: 1280px; height: 720px; position: relative; margin: 0 auto;
    background: rgb(30,32,35);
  }
  .card {
    position: absolute; left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    width: 800px; height: 300px;
    background: rgb(50,53,58); border-radius: 12px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.3);
    padding: 32px 40px; display: flex; flex-direction: column; gap: 16px;
  }
  .line {
    height: 18px; border-radius: 4px;
    background: rgba(255,255,255,0.06);
  }
  .line:nth-child(1) { width: 80%; }
  .line:nth-child(2) { width: 95%; }
  .line:nth-child(3) { width: 72%; }
  .line:nth-child(4) { width: 88%; }
  .hint {
    position: absolute; right: 80px; top: 80px;
    width: 240px; height: 120px;
    background: rgb(40,60,50); border-radius: 8px;
    border: 1px solid rgba(0,200,80,0.3);
    display: flex; align-items: center; justify-content: center;
    color: rgba(0,200,80,0.5); font-size: 16px;
    font-family: system-ui, sans-serif;
  }
</style>
</head>
<body>
<div class="canvas">
  <div class="card" id="card">
    <div class="line"></div><div class="line"></div>
    <div class="line"></div><div class="line"></div>
  </div>
  <div class="hint">专家窗口 →</div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script>
  gsap.to("#card", {
    opacity: 0.3,
    filter: "blur(18px)",
    duration: 1.5,
    ease: "none",
  });
</script>
</body>
</html>
