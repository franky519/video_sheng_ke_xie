<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: rgb(30,32,35); overflow: hidden; display: flex; justify-content: center; }
  canvas { display: block; }
</style>
</head>
<body>
<canvas id="c" width="1280" height="720"></canvas>
<script>
  const W = 1280, H = 720;
  const ctx = c.getContext("2d");
  const DURATION = 1500;
  const start = performance.now();

  function drawCard(progress) {
    ctx.clearRect(0, 0, W, H);

    // background
    ctx.fillStyle = "rgb(30,32,35)";
    ctx.fillRect(0, 0, W, H);

    // card
    const cx = W / 2, cy = H / 2;
    const cw = 800, ch = 300;
    const x = cx - cw / 2, y = cy - ch / 2;
    const r = 12;

    ctx.save();
    ctx.globalAlpha = 1 - progress * 0.7;

    if (progress > 0) {
      const blurPx = 18 * progress;
      ctx.filter = `blur(${blurPx}px)`;
    }

    // shadow
    ctx.shadowColor = "rgba(0,0,0,0.3)";
    ctx.shadowBlur = 24;
    ctx.shadowOffsetY = 4;
    ctx.fillStyle = "rgb(50,53,58)";
    ctx.beginPath();
    ctx.roundRect(x, y, cw, ch, r);
    ctx.fill();

    // reset shadow for lines
    ctx.shadowColor = "transparent";
    ctx.shadowBlur = 0;
    ctx.shadowOffsetY = 0;

    // lines
    const lines = [
      { w: 0.80 * cw - 80, px: x + 40 },
      { w: 0.95 * cw - 80, px: x + 40 },
      { w: 0.72 * cw - 80, px: x + 40 },
      { w: 0.88 * cw - 80, px: x + 40 },
    ];
    ctx.fillStyle = "rgba(255,255,255,0.06)";
    ctx.beginPath();
    for (let i = 0; i < lines.length; i++) {
      const ly = y + 50 + i * 56;
      ctx.roundRect(lines[i].px, ly, lines[i].w, 18, 4);
    }
    ctx.fill();

    ctx.restore();

    // hint
    ctx.globalAlpha = 1;
    ctx.fillStyle = "rgb(40,60,50)";
    ctx.strokeStyle = "rgba(0,200,80,0.3)";
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.roundRect(1280 - 320, 80, 240, 120, 8);
    ctx.fill();
    ctx.stroke();
    ctx.fillStyle = "rgba(0,200,80,0.5)";
    ctx.font = "16px system-ui, sans-serif";
    ctx.textAlign = "center";
    ctx.fillText("专家窗口 →", 1280 - 200, 148);
  }

  function animate(now) {
    const elapsed = now - start;
    const progress = Math.min(elapsed / DURATION, 1);
    drawCard(progress);
    if (progress < 1) requestAnimationFrame(animate);
  }

  drawCard(0);
  requestAnimationFrame(animate);
</script>
</body>
</html>
