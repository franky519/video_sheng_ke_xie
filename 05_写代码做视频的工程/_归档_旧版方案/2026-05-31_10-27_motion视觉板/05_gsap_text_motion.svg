<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540">
  <rect width="960" height="540" fill="#161616"/>
  <text x="48" y="58" fill="#ffffff" font-size="30" font-family="Arial, sans-serif" font-weight="700">GSAP / Motion for React / Anime.js：文字和 UI 状态动效</text>
  <text x="48" y="92" fill="#b8beca" font-size="17" font-family="Arial, sans-serif">适合做：重点字幕、按钮切换、列表重排、路径动画；通常作为局部动效来源</text>

  <text x="88" y="205" fill="#ffffff" font-size="54" font-family="Arial, sans-serif" font-weight="800">复杂任务</text>
  <text x="344" y="205" fill="#ffcf33" font-size="54" font-family="Arial, sans-serif" font-weight="800">先检查模式</text>
  <rect x="344" y="222" width="306" height="10" rx="5" fill="#ff334e"/>

  <rect x="116" y="290" width="210" height="68" rx="34" fill="#263242" stroke="#6172f3" stroke-width="2"/>
  <text x="181" y="333" fill="#dbeafe" font-size="22" font-family="Arial, sans-serif" font-weight="700">快速</text>
  <rect x="372" y="290" width="210" height="68" rx="34" fill="#ff334e"/>
  <text x="437" y="333" fill="#ffffff" font-size="22" font-family="Arial, sans-serif" font-weight="700">专家</text>
  <path d="M250 392 C335 430 440 430 526 392" stroke="#ffcf33" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  <text x="300" y="464" fill="#b8beca" font-size="16" font-family="Arial, sans-serif">状态变化：scale、opacity、x/y、color、underline</text>

  <circle cx="760" cy="200" r="9" fill="#6172f3"/>
  <circle cx="800" cy="200" r="9" fill="#6172f3" opacity="0.65"/>
  <circle cx="840" cy="200" r="9" fill="#6172f3" opacity="0.35"/>
  <rect x="720" y="256" width="164" height="74" rx="12" fill="#242424" stroke="#3a3a3a"/>
  <text x="744" y="287" fill="#9ce8ff" font-size="15" font-family="Menlo, Consolas, monospace">ease: back.out</text>
  <text x="744" y="313" fill="#ffcf33" font-size="15" font-family="Menlo, Consolas, monospace">stagger: 0.08</text>

  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#ffcf33"/>
    </marker>
  </defs>
</svg>
