<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540">
  <rect width="960" height="540" fill="#f8fafc"/>
  <text x="48" y="58" fill="#14171f" font-size="30" font-family="Arial, sans-serif" font-weight="700">Lottie / Rive：小图标、小状态机、小反馈</text>
  <text x="48" y="92" fill="#5b6472" font-size="17" font-family="Arial, sans-serif">适合做：loading、按钮反馈、盖章、状态切换；不适合承担整条视频时间线</text>

  <rect x="110" y="160" width="190" height="210" rx="24" fill="#ffffff" stroke="#d8dee9"/>
  <circle cx="205" cy="236" r="48" fill="#dff6ff" stroke="#60c3e8" stroke-width="4"/>
  <path d="M184 238 L201 254 L228 215" stroke="#0ea5e9" stroke-width="9" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="151" y="326" fill="#111827" font-size="18" font-family="Arial, sans-serif" font-weight="700">Lottie 图标动画</text>

  <rect x="386" y="160" width="190" height="210" rx="24" fill="#ffffff" stroke="#d8dee9"/>
  <rect x="426" y="220" width="110" height="54" rx="27" fill="#ff334e"/>
  <circle cx="507" cy="247" r="21" fill="#ffffff"/>
  <text x="431" y="326" fill="#111827" font-size="18" font-family="Arial, sans-serif" font-weight="700">Rive 状态机</text>

  <rect x="662" y="160" width="190" height="210" rx="24" fill="#ffffff" stroke="#d8dee9"/>
  <rect x="706" y="210" width="100" height="100" rx="50" fill="#fff2c2" stroke="#f0b429" stroke-width="4"/>
  <text x="724" y="273" fill="#a15c00" font-size="32" font-family="Arial, sans-serif" font-weight="900">专家</text>
  <text x="707" y="326" fill="#111827" font-size="18" font-family="Arial, sans-serif" font-weight="700">盖章 / 反馈</text>

  <path d="M300 265 C335 244 350 244 386 265" stroke="#9aa4b2" stroke-width="3" fill="none" stroke-dasharray="8 8" marker-end="url(#arrow)"/>
  <path d="M576 265 C612 244 626 244 662 265" stroke="#9aa4b2" stroke-width="3" fill="none" stroke-dasharray="8 8" marker-end="url(#arrow)"/>
  <text x="162" y="438" fill="#5b6472" font-size="17" font-family="Arial, sans-serif">用法建议：作为 Remotion 里的“小零件”，不要当总工程。</text>

  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#9aa4b2"/>
    </marker>
  </defs>
</svg>
