<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: rgb(30,32,35); overflow: hidden; }
  .canvas {
    width: 1280px; height: 720px; position: relative; margin: 0 auto;
    background: rgb(30,32,35); display: flex; align-items: center; justify-content: center;
  }
  .question {
    font-family: system-ui, sans-serif; font-size: 120px;
    color: rgb(255,60,60); font-weight: 700;
  }
</style>
</head>
<body>
<div class="canvas">
  <div class="question" id="q">?</div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script>
  gsap.set("#q", { scale: 0, filter: "drop-shadow(0 0 0px rgba(255,60,60,0))" });
  gsap.to("#q", {
    scale: 1.2, filter: "drop-shadow(0 0 8px rgba(255,60,60,0.5))",
    duration: 0.3, ease: "power2.out",
  });
  gsap.to("#q", {
    scale: 1, filter: "drop-shadow(0 0 30px rgba(255,60,60,0.7))",
    duration: 0.2, ease: "power2.in", delay: 0.3,
  });
  gsap.to("#q", {
    scale: 1.015, duration: 1, repeat: -1, yoyo: true, ease: "sine.inOut", delay: 0.5,
  });
</script>
</body>
</html>
