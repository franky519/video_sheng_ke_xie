<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: rgb(30,32,35); overflow: hidden; }
  .canvas {
    width: 1280px; height: 720px; position: relative; margin: 0 auto;
    background: rgb(30,32,35); display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 40px;
  }
  .number { font-family: monospace; font-size: 72px; color: white; font-weight: 700; }
  .bar-wrap { width: 80px; height: 200px; background: rgba(255,255,255,0.05); border-radius: 4px; overflow: hidden; }
  .bar { width: 100%; background: rgb(0,200,80); border-radius: 4px; }
</style>
</head>
<body>
<div class="canvas">
  <div class="number" id="num">$0.0000</div>
  <div class="bar-wrap"><div class="bar" id="bar"></div></div>
</div>
<script src="https://cdn.jsdelivr.net/npm/animejs@3.2.2/lib/anime.min.js"></script>
<script>
  const numObj = { val: 0 };
  anime({
    targets: numObj,
    val: 0.0035,
    easing: "easeOutQuad", duration: 500, delay: 300,
    update() { document.getElementById("num").textContent = `$${numObj.val.toFixed(4)}`; }
  });
  anime({
    targets: "#bar",
    height: ["0%", "100%"],
    easing: "easeOutQuad", duration: 800, delay: 300,
  });
</script>
</body>
</html>
