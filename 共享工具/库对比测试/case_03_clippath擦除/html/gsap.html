<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: rgb(30,32,35); overflow: hidden; }
  .canvas {
    width: 1280px; height: 720px; position: relative; margin: 0 auto;
    background: rgb(30,32,35);
  }
  .card {
    position: absolute; left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    width: 800px; height: 360px;
    background: rgb(50,53,58); border-radius: 12px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.3);
    padding: 40px 50px;
  }
  .text-line {
    height: 16px; border-radius: 3px;
    background: rgba(255,255,255,0.07);
    margin-bottom: 40px;
  }
  .text-line:nth-child(1) { width: 75%; }
  .text-line:nth-child(2) { width: 88%; }
  .text-line:nth-child(3) { width: 65%; }
  .highlight {
    position: absolute; left: 50px; height: 26px;
    border-radius: 4px; opacity: 0.3;
    clip-path: inset(0% 100% 0% 0%);
  }
  .hl-green {
    width: 525px; top: 42px;
    background: rgb(0,200,80);
  }
  .hl-orange {
    width: 616px; top: 98px;
    background: rgb(255,160,20);
  }
</style>
</head>
<body>
<div class="canvas">
  <div class="card">
    <div class="text-line"></div>
    <div class="text-line"></div>
    <div class="text-line"></div>
    <div class="highlight hl-green" id="hlGreen"></div>
    <div class="highlight hl-orange" id="hlOrange"></div>
  </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script>
  gsap.to("#hlGreen", {
    clipPath: "inset(0% 0% 0% 0%)",
    duration: 1, ease: "power2.out", delay: 0.1,
  });
  gsap.to("#hlOrange", {
    clipPath: "inset(0% 0% 0% 0%)",
    duration: 1, ease: "power2.out", delay: 1.1,
  });
</script>
</body>
</html>
